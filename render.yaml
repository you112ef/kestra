services:
  - type: web
    name: kestra-production
    env: docker
    dockerfilePath: ./Dockerfile.simple-working
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /api/v1/health
    envVars:
      # إعدادات الخادم
      - key: KESTRA_SERVER_PORT
        value: "8080"
      - key: KESTRA_SERVER_HOST
        value: "0.0.0.0"
      
      # إعدادات قاعدة البيانات
      - key: KESTRA_REPOSITORY_TYPE
        value: "h2"
      
      # إعدادات التخزين
      - key: KESTRA_STORAGE_TYPE
        value: "local"
      - key: KESTRA_STORAGE_LOCAL_BASEPATH
        value: "/app/storage"
      
      # إعدادات إضافية
      - key: KESTRA_ANONYMOUS_USAGE_REPORT_ENABLED
        value: "false"
      - key: KESTRA_TASKS_TMPDIR_PATH
        value: "/tmp/kestra-wd/tmp"
      
      # إعدادات Java
      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m -Djava.security.egd=file:/dev/./urandom"
      - key: TZ
        value: "UTC"